<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIDI Captain · Live Device Sync</title>
    <meta
      name="description"
      content="Edit the MIDI Captain (Rust/Embassy firmware) live config over Web Serial — connect, read, edit, write, hot-reload."
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>MIDI&nbsp;Captain <span class="sub">Remedy · Live Sync</span></h1>
      <nav class="tabs" aria-label="Editor mode">
        <button type="button" data-tab="live" class="active">Live Device</button>
        <button type="button" data-tab="oem">OEM Files</button>
      </nav>
    </header>

    <main>
      <section id="tab-live" class="tab" aria-label="Live device editor"></section>
      <section id="tab-oem" class="tab" hidden aria-label="OEM file editor"></section>
    </main>

    <footer class="foot">
      Web Serial (Chromium · https or localhost) · device USB 2E8A:102D ·
      protocol v1
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
